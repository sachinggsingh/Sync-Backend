name: CI SyncEditor Backend
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Server/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: Server
      - name: Security Audit
        run: npm audit
        working-directory: Server
      - name: Build
        run: npm run build
        working-directory: Server
      - name: Test
        run: npm run test
        working-directory: Server
      - name: Lint
        run: npm run lint
        working-directory: Server
